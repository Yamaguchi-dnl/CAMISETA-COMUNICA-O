# Configurações para o Firebase App Hosting
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 10
  minInstances: 0
  concurrency: 80

# Note: App Hosting uses Cloud Run under the hood and automatically handles many optimizations.
# Next.js will handle caching headers for static assets (/_next/static) automatically.
